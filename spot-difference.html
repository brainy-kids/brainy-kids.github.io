<html lang="en">

<script src="assets/img/spot-difference/data-02.js"></script>

<style>
:root { --bg: #fff8ec; --ink: #1f1147; }
html, body { background: var(--bg); color: var(--ink); min-height: 100vh; }
body {
  font-family: 'Nunito', system-ui, sans-serif;
  background-image:
    radial-gradient(circle at 10% 10%, rgba(255,200,87,.25) 0, transparent 35%),
    radial-gradient(circle at 90% 20%, rgba(120,200,255,.25) 0, transparent 35%),
    radial-gradient(circle at 80% 90%, rgba(255,130,160,.22) 0, transparent 35%),
    radial-gradient(circle at 15% 85%, rgba(150,230,170,.25) 0, transparent 35%);
}
.display { font-family: 'Fredoka', system-ui, sans-serif; letter-spacing: -0.02em; }
.card  { border: 3px solid var(--ink); border-radius: 28px; box-shadow: 6px 6px 0 0 var(--ink); }
.pill  { border: 2px solid var(--ink); border-radius: 999px; box-shadow: 3px 3px 0 0 var(--ink); display: inline-block; }

.btn {
  border: 3px solid var(--ink);
  border-radius: 999px;
  padding: 9px 22px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 0.9rem;
  cursor: pointer;
  box-shadow: 4px 4px 0 0 var(--ink);
  background: var(--bg);
  color: var(--ink);
  transition: transform .1s, box-shadow .1s;
  -webkit-tap-highlight-color: transparent;
}
.btn:hover  { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 0 var(--ink); }
.btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 0 var(--ink); }
.btn:disabled { opacity: .45; cursor: not-allowed; transform: none !important; box-shadow: 4px 4px 0 0 var(--ink) !important; }
.btn-dark { background: var(--ink); color: #fff8ec; }

/* ── Progress dots ────────────────────────────────────── */
.dots-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 2px solid var(--ink);
  background: var(--bg);
  transition: background .25s;
  flex-shrink: 0;
}
.dot.done    { background: #16a34a; border-color: #16a34a; }
.dot.current { background: #f59e0b; border-color: #f59e0b; transform: scale(1.2); }

/* ── Score badge ──────────────────────────────────────── */
.score-badge {
  background: var(--ink); color: #fff8ec;
  font-family: 'Fredoka', sans-serif; font-size: 1.05rem;
  padding: 5px 18px; border-radius: 999px;
  min-width: 130px; text-align: center; letter-spacing: .025em;
}

/* ── Image panels ─────────────────────────────────────── */
.img-wrap {
  position: relative;
  border: 3px solid var(--ink);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 6px 6px 0 0 var(--ink);
  width: 100%;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}
.img-wrap img {
  display: block; width: 100%; height: auto;
  pointer-events: none;
  -webkit-user-drag: none;
  transition: opacity .22s;
}
.b-wrap { cursor: crosshair; }

/* ── Markers ──────────────────────────────────────────── */
.mark {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
  box-sizing: border-box;
}
.mark-found {
  border: 3px solid #16a34a;
  background: rgba(22,163,74,.18);
  box-shadow: 0 0 0 2px #fff, 0 0 0 4px #16a34a;
  animation: mark-pop .35s cubic-bezier(.36,.07,.19,.97) both;
}
.mark-hint {
  border: 3px dashed #f59e0b;
  background: rgba(245,158,11,.18);
  box-shadow: 0 0 0 2px #fff, 0 0 0 4px #f59e0b;
  animation: hint-pulse 1.7s ease forwards;
}
.mark-miss {
  border: 2px solid #dc2626;
  background: rgba(220,38,38,.15);
  width: 44px !important; height: 44px !important;
  animation: miss-out .65s ease forwards;
}

@keyframes mark-pop {
  0%   { transform: translate(-50%,-50%) scale(0);   opacity: 0; }
  65%  { transform: translate(-50%,-50%) scale(1.2); }
  100% { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
}
@keyframes hint-pulse {
  0%   { transform: translate(-50%,-50%) scale(.5);  opacity: 0; }
  25%  { transform: translate(-50%,-50%) scale(1.1); opacity: 1; }
  75%  { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(1);   opacity: 0; }
}
@keyframes miss-out {
  0%   { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(1.5); opacity: 0; }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  18%  { transform: translateX(-10px); }
  36%  { transform: translateX(9px); }
  54%  { transform: translateX(-7px); }
  72%  { transform: translateX(5px); }
  88%  { transform: translateX(-3px); }
}
.shake { animation: shake .42s ease; }

/* ── Level divider ────────────────────────────────────── */
.level-hr {
  border: none;
  border-top: 3px solid var(--ink);
  opacity: .12;
  margin: 3rem 0;
}

/* ── Win banner ───────────────────────────────────────── */
.win-banner {
  display: none;
  margin-top: 1.25rem;
  padding: 1.25rem;
  text-align: center;
  border: 3px solid var(--ink);
  border-radius: 20px;
  box-shadow: 6px 6px 0 0 var(--ink);
  background: #d1fae5;
}
.win-banner.show { display: block; }
</style>
</head>
<body class="min-h-screen">
<main class="relative max-w-4xl mx-auto px-4 py-8 md:py-12">

  <!-- · Nav · -->
  <div class="flex items-center justify-between mb-6">
    <a href="./" class="pill bg-white px-4 py-1 text-sm font-bold hover:bg-[color:var(--ink)] hover:text-[#fff8ec] transition-colors">← Back</a>
    <div>
      <strong class="pill bg-[color:var(--ink)] text-[#fff8ec] px-3 py-1 text-xs font-bold">EN</strong>
      <a href="de/spot-difference.html" class="pill bg-white px-3 py-1 text-xs font-bold ml-1">DE</a>
      <a href="sq/spot-difference.html" class="pill bg-white px-3 py-1 text-xs font-bold ml-1">SQ</a>
    </div>
  </div>

  <!-- · Header · -->
  <header class="text-center mb-6">
    <h1 class="display text-4xl md:text-6xl font-bold mb-2">🔍 Spot the Difference</h1>
    <p class="font-semibold opacity-70 text-lg">Find what changed between the two pictures!</p>
  </header>

  <!-- · Global controls · -->
  <div class="flex justify-end mb-6">
    <button class="btn text-sm px-3" id="mute-btn" onclick="toggleMute()" title="Mute / Unmute">🔊</button>
  </div>

  <!-- · Levels (rendered by JS) · -->
  <div id="levels-container"></div>

  <footer class="mt-16 text-center pb-6">
    <p class="font-semibold opacity-50 text-sm">Made with ❤️ for kids</p>
    <p class="mt-2 text-xs opacity-40 font-semibold">Designed &amp; built by <a href="https://shkelzenbaftijari.gitlab.io/" target="_blank" rel="noopener" class="underline hover:opacity-80">Shkelzen Baftijari</a> &middot; &copy; <span id="copy-yr"></span></p>
  </footer>

</main>

<canvas id="cvc" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:49;display:none;"></canvas>

<script>
const LEVELS = [
  window.SPOT_LEVEL_01,
  window.SPOT_LEVEL_02,
  // window.SPOT_LEVEL_03,
  // window.SPOT_LEVEL_04,
  // window.SPOT_LEVEL_05,
].filter(Boolean);

let audioCtx = null;
let muted    = false;

const games = LEVELS.map((lvl, idx) => ({
  lvl, idx,
  totalFound: 0,
  foundSet: new Set(),
  hintsLeft: 2,
  hintBusy: false,
  active: false,
}));

function isClassic(g) { return !!(g.lvl && g.lvl.differences); }

// ── Render all levels ──────────────────────────────────────────
function renderLevels() {
  const container = document.getElementById('levels-container');
  games.forEach((g, i) => {
    const lvl   = g.lvl;
    const total = isClassic(g) ? lvl.differences.length : lvl.rounds.length;

    const section = document.createElement('section');
    section.id = `lvl-${i}`;
    section.innerHTML = `
      <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
        <div class="flex items-center gap-3 flex-wrap">
          <span class="display font-bold text-xl">Level ${i + 1} <span style="opacity:.4">·</span> ${lvl.title}</span>
          <div class="score-badge" id="score-${i}">0 / ${total} found</div>
        </div>
        <div class="flex items-center gap-3 flex-wrap">
          <div class="dots-row" id="dots-${i}"></div>
          <button class="btn text-sm" id="hint-btn-${i}" onclick="useHint(${i})">💡 Hint (<span id="hint-count-${i}">2</span>)</button>
        </div>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="flex flex-col gap-2">
          <p class="text-center font-bold text-xs uppercase tracking-widest opacity-50">Original</p>
          <div class="img-wrap">
            <img id="img-a-${i}" alt="Original" src="${lvl.a}" />
          </div>
        </div>
        <div class="flex flex-col gap-2">
          <p class="text-center font-bold text-xs uppercase tracking-widest opacity-50">What changed? 👆</p>
          <div class="img-wrap b-wrap" id="b-wrap-${i}">
            <img id="img-b-${i}" alt="Find the difference" src="${lvl.b}" />
          </div>
        </div>
      </div>
      <div class="win-banner" id="win-banner-${i}">
        <div class="text-4xl mb-1">🎉</div>
        <p class="display font-bold text-2xl">You found all ${total} differences!</p>
      </div>
    `;
    container.appendChild(section);

    if (i < games.length - 1) {
      const hr = document.createElement('hr');
      hr.className = 'level-hr';
      container.appendChild(hr);
    }

    const bWrap = document.getElementById(`b-wrap-${i}`);
    const imgB  = document.getElementById(`img-b-${i}`);
    imgB.onload = () => { g.active = true; };
    if (imgB.complete && imgB.naturalWidth) g.active = true;
    bWrap.addEventListener('pointerdown', e => e.preventDefault());
    bWrap.addEventListener('pointerup', e => handleTap(e, i));

    buildDots(i);
    updateUI(i);
  });
}

// ── Dots ───────────────────────────────────────────────────────
function buildDots(i) {
  const g     = games[i];
  const el    = document.getElementById(`dots-${i}`);
  if (!el) return;
  const items = isClassic(g) ? g.lvl.differences : g.lvl.rounds;
  el.innerHTML = '';
  items.forEach((_, j) => {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = `dot-${i}-${j}`;
    el.appendChild(d);
  });
}

function updateDots(i) {
  const g     = games[i];
  const items = isClassic(g) ? g.lvl.differences : g.lvl.rounds;
  items.forEach((_, j) => {
    const d = document.getElementById(`dot-${i}-${j}`);
    if (!d) return;
    d.className = 'dot' + (j < g.totalFound ? ' done' : '');
  });
}

// ── UI ─────────────────────────────────────────────────────────
function updateUI(i) {
  const g       = games[i];
  const total   = isClassic(g) ? g.lvl.differences.length : g.lvl.rounds.length;
  const scoreEl = document.getElementById(`score-${i}`);
  const cntEl   = document.getElementById(`hint-count-${i}`);
  const hintBtn = document.getElementById(`hint-btn-${i}`);
  if (scoreEl) scoreEl.textContent = `${g.totalFound} / ${total} found`;
  if (cntEl)   cntEl.textContent   = g.hintsLeft;
  if (hintBtn) hintBtn.disabled    = g.hintsLeft <= 0 || g.hintBusy || !g.active;
  updateDots(i);
}

// ── Tap handler ────────────────────────────────────────────────
function handleTap(e, i) {
  const g = games[i];
  if (!g.active || !g.lvl) return;
  e.preventDefault();

  const imgB = document.getElementById(`img-b-${i}`);
  const rect  = imgB.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  if (cx < 0 || cy < 0 || cx > rect.width || cy > rect.height) return;

  const nw = imgB.naturalWidth  || 1024;
  const nh = imgB.naturalHeight || 1024;
  const nx = cx / rect.width  * nw;
  const ny = cy / rect.height * nh;
  const bWrap = document.getElementById(`b-wrap-${i}`);

  if (isClassic(g)) {
    let foundIdx = -1;
    for (let j = 0; j < g.lvl.differences.length; j++) {
      if (g.foundSet.has(j)) continue;
      const d = g.lvl.differences[j];
      if (Math.hypot(nx - d.x, ny - d.y) <= d.r) { foundIdx = j; break; }
    }
    if (foundIdx >= 0) {
      onFoundClassic(i, foundIdx);
    } else {
      spawnMissMark(bWrap, cx / rect.width * 100, cy / rect.height * 100);
      doShake(bWrap.parentElement);
      playSound(false);
    }
  }
}

// ── Found ──────────────────────────────────────────────────────
function onFoundClassic(i, idx) {
  const g     = games[i];
  const bWrap = document.getElementById(`b-wrap-${i}`);
  g.foundSet.add(idx);
  g.totalFound = g.foundSet.size;
  spawnDiffMark(bWrap, g.lvl.differences[idx], 'mark-found');
  updateUI(i);
  playSound(true);
  if (g.totalFound === g.lvl.differences.length) {
    g.active = false;
    setTimeout(() => showWin(i), 650);
  }
}

// ── Markers ────────────────────────────────────────────────────
function spawnDiffMark(bWrap, d, cls) {
  const imgB = bWrap.querySelector('img');
  const nw   = imgB.naturalWidth  || 1024;
  const nh   = imgB.naturalHeight || 1024;
  const el   = document.createElement('div');
  el.className = `mark ${cls}`;
  el.style.left   = `${d.x / nw * 100}%`;
  el.style.top    = `${d.y / nh * 100}%`;
  el.style.width  = `${d.r * 2 / nw * 100}%`;
  el.style.height = `${d.r * 2 / nh * 100}%`;
  bWrap.appendChild(el);
  return el;
}

function spawnMissMark(bWrap, pctX, pctY) {
  const el = document.createElement('div');
  el.className = 'mark mark-miss';
  el.style.left = `${pctX}%`;
  el.style.top  = `${pctY}%`;
  bWrap.appendChild(el);
  setTimeout(() => el.remove(), 680);
}

// ── Shake ──────────────────────────────────────────────────────
function doShake(el) {
  el.classList.remove('shake');
  void el.offsetWidth;
  el.classList.add('shake');
  el.addEventListener('animationend', () => el.classList.remove('shake'), { once: true });
}

// ── Hint ───────────────────────────────────────────────────────
function useHint(i) {
  const g = games[i];
  if (g.hintsLeft <= 0 || g.hintBusy || !g.active) return;
  g.hintsLeft--;
  g.hintBusy = true;
  updateUI(i);
  const bWrap = document.getElementById(`b-wrap-${i}`);
  const idx   = g.lvl.differences.findIndex((_, j) => !g.foundSet.has(j));
  if (idx < 0) { g.hintBusy = false; updateUI(i); return; }
  const el = spawnDiffMark(bWrap, g.lvl.differences[idx], 'mark-hint');
  setTimeout(() => { el.remove(); g.hintBusy = false; updateUI(i); }, 1750);
}

// ── Win ────────────────────────────────────────────────────────
function showWin(i) {
  const banner = document.getElementById(`win-banner-${i}`);
  if (banner) banner.classList.add('show');
  launchConfetti();
}

// ── Mute ───────────────────────────────────────────────────────
function toggleMute() {
  muted = !muted;
  document.getElementById('mute-btn').textContent = muted ? '🔇' : '🔊';
}

// ── Sound ──────────────────────────────────────────────────────
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playSound(ok) {
  if (muted) return;
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if (ok) {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(660, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1100, ctx.currentTime + 0.13);
      gain.gain.setValueAtTime(0.22, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.55);
      osc.start(); osc.stop(ctx.currentTime + 0.55);
    } else {
      osc.type = 'sine'; osc.frequency.value = 260;
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
      osc.start(); osc.stop(ctx.currentTime + 0.2);
    }
  } catch (_) {}
}

// ── Confetti ───────────────────────────────────────────────────
function launchConfetti() {
  const cv = document.getElementById('cvc');
  cv.style.display = 'block';
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  const ctx    = cv.getContext('2d');
  const colors = ['#f59e0b','#ef4444','#3b82f6','#22c55e','#a855f7','#ec4899','#ff8c00'];
  const parts  = Array.from({ length: 140 }, () => ({
    x: Math.random() * cv.width, y: -30 - Math.random() * 200,
    r: 4 + Math.random() * 7,
    dx: (Math.random() - .5) * 5, dy: 2.5 + Math.random() * 3.5,
    rot: Math.random() * Math.PI * 2, dr: (Math.random() - .5) * .14,
    c: colors[Math.floor(Math.random() * colors.length)], sq: Math.random() < .5
  }));
  let f = 0;
  (function tick() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    parts.forEach(p => {
      p.x += p.dx; p.y += p.dy; p.rot += p.dr; p.dy = Math.min(p.dy + .04, 6.5);
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot); ctx.fillStyle = p.c;
      if (p.sq) ctx.fillRect(-p.r, -p.r * .4, p.r * 2, p.r * .8);
      else { ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI * 2); ctx.fill(); }
      ctx.restore();
    });
    if (++f < 230) requestAnimationFrame(tick);
    else { ctx.clearRect(0, 0, cv.width, cv.height); cv.style.display = 'none'; }
  })();
}

// ── Init ───────────────────────────────────────────────────────
renderLevels();
</script>
<script>document.getElementById("copy-yr").textContent=new Date().getFullYear();</script>
</body>
