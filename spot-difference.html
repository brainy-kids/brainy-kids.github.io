<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spot the Difference — Kids Games 🔍</title>
<meta name="description" content="Find the difference between two pictures!" />
<link rel="stylesheet" href="assets/css/tailwind.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<script src="assets/img/spot-difference/data-01.js"></script>

<style>
:root { --bg: #fff8ec; --ink: #1f1147; }
html, body { background: var(--bg); color: var(--ink); min-height: 100vh; }
body {
  font-family: 'Nunito', system-ui, sans-serif;
  background-image:
    radial-gradient(circle at 10% 10%, rgba(255,200,87,.25) 0, transparent 35%),
    radial-gradient(circle at 90% 20%, rgba(120,200,255,.25) 0, transparent 35%),
    radial-gradient(circle at 80% 90%, rgba(255,130,160,.22) 0, transparent 35%),
    radial-gradient(circle at 15% 85%, rgba(150,230,170,.25) 0, transparent 35%);
}
.display { font-family: 'Fredoka', system-ui, sans-serif; letter-spacing: -0.02em; }
.card  { border: 3px solid var(--ink); border-radius: 28px; box-shadow: 6px 6px 0 0 var(--ink); }
.pill  { border: 2px solid var(--ink); border-radius: 999px; box-shadow: 3px 3px 0 0 var(--ink); display: inline-block; }

.btn {
  border: 3px solid var(--ink);
  border-radius: 999px;
  padding: 9px 22px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 0.9rem;
  cursor: pointer;
  box-shadow: 4px 4px 0 0 var(--ink);
  background: var(--bg);
  color: var(--ink);
  transition: transform .1s, box-shadow .1s;
  -webkit-tap-highlight-color: transparent;
}
.btn:hover  { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 0 var(--ink); }
.btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 0 var(--ink); }
.btn:disabled { opacity: .45; cursor: not-allowed; transform: none !important; box-shadow: 4px 4px 0 0 var(--ink) !important; }
.btn-dark { background: var(--ink); color: #fff8ec; }

/* ── Progress dots ────────────────────────────────────── */
#progress-dots { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 2px solid var(--ink);
  background: var(--bg);
  transition: background .25s;
  flex-shrink: 0;
}
.dot.done    { background: #16a34a; border-color: #16a34a; }
.dot.current { background: #f59e0b; border-color: #f59e0b; transform: scale(1.2); }

/* ── Image panels ─────────────────────────────────────── */
.img-wrap {
  position: relative;
  border: 3px solid var(--ink);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 6px 6px 0 0 var(--ink);
  width: 100%;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}
.img-wrap img {
  display: block; width: 100%; height: auto;
  pointer-events: none;
  -webkit-user-drag: none;
  transition: opacity .22s;
}
#b-wrap { cursor: crosshair; }

/* ── Markers ──────────────────────────────────────────── */
.mark {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
  box-sizing: border-box;
}
.mark-found {
  border: 3px solid #16a34a;
  background: rgba(22,163,74,.18);
  box-shadow: 0 0 0 2px #fff, 0 0 0 4px #16a34a;
  animation: mark-pop .35s cubic-bezier(.36,.07,.19,.97) both;
}
.mark-hint {
  border: 3px dashed #f59e0b;
  background: rgba(245,158,11,.18);
  box-shadow: 0 0 0 2px #fff, 0 0 0 4px #f59e0b;
  animation: hint-pulse 1.7s ease forwards;
}
.mark-miss {
  border: 2px solid #dc2626;
  background: rgba(220,38,38,.15);
  width: 44px !important; height: 44px !important;
  animation: miss-out .65s ease forwards;
}

@keyframes mark-pop {
  0%   { transform: translate(-50%,-50%) scale(0);   opacity: 0; }
  65%  { transform: translate(-50%,-50%) scale(1.2); }
  100% { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
}
@keyframes hint-pulse {
  0%   { transform: translate(-50%,-50%) scale(.5);  opacity: 0; }
  25%  { transform: translate(-50%,-50%) scale(1.1); opacity: 1; }
  75%  { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(1);   opacity: 0; }
}
@keyframes miss-out {
  0%   { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(1.5); opacity: 0; }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  18%  { transform: translateX(-10px); }
  36%  { transform: translateX(9px); }
  54%  { transform: translateX(-7px); }
  72%  { transform: translateX(5px); }
  88%  { transform: translateX(-3px); }
}
.shake { animation: shake .42s ease; }

/* ── Score badge ──────────────────────────────────────── */
#score-badge {
  background: var(--ink); color: #fff8ec;
  font-family: 'Fredoka', sans-serif; font-size: 1.15rem;
  padding: 7px 22px; border-radius: 999px;
  min-width: 150px; text-align: center; letter-spacing: .025em;
}

/* ── Win overlay ──────────────────────────────────────── */
#win-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.48);
  display: flex; align-items: center; justify-content: center;
  z-index: 50; opacity: 0; pointer-events: none;
  transition: opacity .3s;
}
#win-overlay.show { opacity: 1; pointer-events: all; }
</style>
</head>
<body class="min-h-screen">
<main class="relative max-w-4xl mx-auto px-4 py-8 md:py-12">

  <!-- Nav -->
  <div class="flex items-center justify-between mb-6">
    <a href="./" class="pill bg-white px-4 py-1 text-sm font-bold hover:bg-[color:var(--ink)] hover:text-[#fff8ec] transition-colors">← Back</a>
    <div>
      <strong class="pill bg-[color:var(--ink)] text-[#fff8ec] px-3 py-1 text-xs font-bold">EN</strong>
      <a href="de/spot-difference.html" class="pill bg-white px-3 py-1 text-xs font-bold ml-1">DE</a>
      <a href="sq/spot-difference.html" class="pill bg-white px-3 py-1 text-xs font-bold ml-1">SQ</a>
    </div>
  </div>

  <!-- Header -->
  <header class="text-center mb-6">
    <h1 class="display text-4xl md:text-6xl font-bold mb-2">🔍 Spot the Difference</h1>
    <p class="font-semibold opacity-70 text-lg">Find what changed between the two pictures!</p>
  </header>

  <!-- Score + progress -->
  <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
    <div id="score-badge">0 / 8 found</div>
    <div class="flex items-center gap-3 flex-wrap">
      <div id="progress-dots"></div>
      <button class="btn text-sm" id="hint-btn" onclick="useHint()">
        💡 Hint (<span id="hint-count">2</span>)
      </button>
      <button class="btn text-sm px-3" id="mute-btn" onclick="toggleMute()" title="Mute / Unmute">🔊</button>
    </div>
  </div>

  <!-- Game area -->
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

    <div class="flex flex-col gap-2">
      <p class="text-center font-bold text-xs uppercase tracking-widest opacity-50">Original</p>
      <div class="img-wrap">
        <img id="img-a" alt="Original" />
      </div>
    </div>

    <div class="flex flex-col gap-2">
      <p class="text-center font-bold text-xs uppercase tracking-widest opacity-50">What changed? 👆</p>
      <div class="img-wrap" id="b-wrap">
        <img id="img-b" alt="Find the difference" />
      </div>
    </div>

  </div>

</main>

<!-- Win overlay -->
<div id="win-overlay">
  <div class="card bg-[#fff8ec] p-8 text-center mx-4 max-w-xs w-full">
    <div class="text-6xl mb-3">🎉</div>
    <h2 class="display text-4xl font-bold mb-2">Bravo!</h2>
    <p id="win-msg" class="text-lg mb-6">You found all the differences!</p>
    <div class="flex flex-col gap-3">
      <button id="btn-next" class="btn btn-dark" onclick="nextLevel()">Next level →</button>
      <button class="btn" onclick="replayLevel()">🔄 Play again</button>
    </div>
  </div>
</div>

<canvas id="cvc" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:49;display:none;"></canvas>

<script>
const LEVELS = [
  window.SPOT_LEVEL_01,
  // window.SPOT_LEVEL_02,
  // window.SPOT_LEVEL_03,
  // window.SPOT_LEVEL_04,
  // window.SPOT_LEVEL_05,
].filter(Boolean);

let lvl          = null;
let curRound     = 0;
let totalFound   = 0;
let foundSet     = new Set();
let hintsLeft    = 3;
let hintBusy     = false;
let active       = false;
let transitioning = false;
let curLvlIdx    = 0;
let audioCtx     = null;
let muted        = false;

const imgA       = document.getElementById('img-a');
const imgB       = document.getElementById('img-b');
const bWrap      = document.getElementById('b-wrap');
const scoreBadge = document.getElementById('score-badge');
const hintCount  = document.getElementById('hint-count');
const hintBtn    = document.getElementById('hint-btn');
const winOverlay = document.getElementById('win-overlay');
const btnNext    = document.getElementById('btn-next');
const dotsEl     = document.getElementById('progress-dots');

function isClassicMode() { return !!(lvl && lvl.differences); }

// ── Load level ─────────────────────────────────────────────────
function loadLevel(idx) {
  active = false;
  curRound = 0;
  totalFound = 0;
  foundSet = new Set();
  hintsLeft = 2;
  hintBusy = false;
  transitioning = false;
  winOverlay.classList.remove('show');

  lvl = LEVELS[idx];
  if (!lvl) { scoreBadge.textContent = 'Error loading level'; return; }

  imgA.src = lvl.a;
  buildDots();
  if (isClassicMode()) {
    loadClassic();
  } else {
    loadRound(0);
  }
}

// ── Classic mode init ──────────────────────────────────────────
function loadClassic() {
  active = false;
  transitioning = false;
  bWrap.querySelectorAll('.mark').forEach(el => el.remove());
  updateUI();
  imgB.style.opacity = '0';
  imgB.onload = () => { imgB.style.opacity = '1'; active = true; };
  imgB.src = lvl.b;
  if (imgB.complete && imgB.naturalWidth) { imgB.style.opacity = '1'; active = true; }
}

// ── Load round ─────────────────────────────────────────────────
function loadRound(idx) {
  active = false;
  transitioning = false;
  bWrap.querySelectorAll('.mark').forEach(el => el.remove());
  updateUI();

  const r = lvl.rounds[idx];
  imgB.style.opacity = '0';
  imgB.onload = () => { imgB.style.opacity = '1'; active = true; };
  imgB.src = r.b;
  if (imgB.complete && imgB.naturalWidth) { imgB.style.opacity = '1'; active = true; }
}

// ── Dots ───────────────────────────────────────────────────────
function buildDots() {
  dotsEl.innerHTML = '';
  const items = isClassicMode() ? lvl.differences : lvl.rounds;
  items.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = `dot-${i}`;
    dotsEl.appendChild(d);
  });
}

function updateDots() {
  if (isClassicMode()) {
    lvl.differences.forEach((_, i) => {
      const d = document.getElementById(`dot-${i}`);
      if (!d) return;
      d.className = 'dot' + (i < totalFound ? ' done' : '');
    });
  } else {
    lvl.rounds.forEach((_, i) => {
      const d = document.getElementById(`dot-${i}`);
      if (!d) return;
      d.className = 'dot' + (i < totalFound ? ' done' : i === curRound ? ' current' : '');
    });
  }
}

// ── UI ─────────────────────────────────────────────────────────
function updateUI() {
  const total = lvl ? (isClassicMode() ? lvl.differences.length : lvl.rounds.length) : 0;
  scoreBadge.textContent = `${totalFound} / ${total} found`;
  hintCount.textContent = hintsLeft;
  hintBtn.disabled = hintsLeft <= 0 || hintBusy || !active;
  updateDots();
}

// ── Interaction ────────────────────────────────────────────────
bWrap.addEventListener('pointerdown', e => e.preventDefault());
bWrap.addEventListener('pointerup', handleTap);

function handleTap(e) {
  if (!active || !lvl || transitioning) return;
  e.preventDefault();

  const rect = imgB.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  if (cx < 0 || cy < 0 || cx > rect.width || cy > rect.height) return;

  const nw = imgB.naturalWidth  || 1024;
  const nh = imgB.naturalHeight || 1024;
  const nx = cx / rect.width  * nw;
  const ny = cy / rect.height * nh;

  if (isClassicMode()) {
    let foundIdx = -1;
    for (let i = 0; i < lvl.differences.length; i++) {
      if (foundSet.has(i)) continue;
      const d = lvl.differences[i];
      if (Math.hypot(nx - d.x, ny - d.y) <= d.r) { foundIdx = i; break; }
    }
    if (foundIdx >= 0) {
      onFoundClassic(foundIdx);
    } else {
      spawnMissMark(cx / rect.width * 100, cy / rect.height * 100);
      doShake(bWrap.parentElement);
      playSound(false);
    }
  } else {
    const diff = lvl.rounds[curRound];
    if (Math.hypot(nx - diff.x, ny - diff.y) <= diff.r) {
      onFound(diff);
    } else {
      spawnMissMark(cx / rect.width * 100, cy / rect.height * 100);
      doShake(bWrap.parentElement);
      playSound(false);
    }
  }
}

// ── Found (rounds mode) ────────────────────────────────────────
function onFound(diff) {
  active = false;
  transitioning = true;
  totalFound++;
  spawnDiffMark(diff, 'mark-found');
  updateUI();
  playSound(true);

  if (totalFound === lvl.rounds.length) {
    setTimeout(showWin, 650);
  } else {
    setTimeout(() => {
      curRound++;
      loadRound(curRound);
    }, 1100);
  }
}

// ── Found (classic mode) ───────────────────────────────────────
function onFoundClassic(idx) {
  foundSet.add(idx);
  totalFound = foundSet.size;
  spawnDiffMark(lvl.differences[idx], 'mark-found');
  updateUI();
  playSound(true);

  if (totalFound === lvl.differences.length) {
    active = false;
    setTimeout(showWin, 650);
  }
}

// ── Markers ────────────────────────────────────────────────────
function spawnDiffMark(d, cls, ttl) {
  const nw = imgB.naturalWidth  || 1024;
  const nh = imgB.naturalHeight || 1024;
  const el = document.createElement('div');
  el.className = `mark ${cls}`;
  el.style.left   = `${d.x / nw * 100}%`;
  el.style.top    = `${d.y / nh * 100}%`;
  el.style.width  = `${d.r * 2 / nw * 100}%`;
  el.style.height = `${d.r * 2 / nh * 100}%`;
  bWrap.appendChild(el);
  if (ttl) setTimeout(() => el.remove(), ttl);
  return el;
}

function spawnMissMark(pctX, pctY) {
  const el = document.createElement('div');
  el.className = 'mark mark-miss';
  el.style.left = `${pctX}%`;
  el.style.top  = `${pctY}%`;
  bWrap.appendChild(el);
  setTimeout(() => el.remove(), 680);
}

// ── Shake ──────────────────────────────────────────────────────
function doShake(el) {
  el.classList.remove('shake');
  void el.offsetWidth;
  el.classList.add('shake');
  el.addEventListener('animationend', () => el.classList.remove('shake'), { once: true });
}

// ── Hint ───────────────────────────────────────────────────────
function useHint() {
  if (hintsLeft <= 0 || hintBusy || !lvl || !active) return;
  hintsLeft--;
  hintBusy = true;
  updateUI();

  let el;
  if (isClassicMode()) {
    const idx = lvl.differences.findIndex((_, i) => !foundSet.has(i));
    if (idx < 0) { hintBusy = false; updateUI(); return; }
    el = spawnDiffMark(lvl.differences[idx], 'mark-hint');
  } else {
    el = spawnDiffMark(lvl.rounds[curRound], 'mark-hint');
  }
  setTimeout(() => { el.remove(); hintBusy = false; updateUI(); }, 1750);
}

// ── Win ────────────────────────────────────────────────────────
function showWin() {
  active = false;
  const total = isClassicMode() ? lvl.differences.length : lvl.rounds.length;
  document.getElementById('win-msg').textContent = `You found all ${total} differences!`;
  winOverlay.classList.add('show');
  btnNext.disabled    = curLvlIdx >= LEVELS.length - 1;
  btnNext.textContent = btnNext.disabled ? '🏆 Champion!' : 'Next level →';
  launchConfetti();
}

function nextLevel() {
  if (curLvlIdx < LEVELS.length - 1) { curLvlIdx++; loadLevel(curLvlIdx); }
}
function replayLevel() { loadLevel(curLvlIdx); }

// ── Mute ───────────────────────────────────────────────────────
function toggleMute() {
  muted = !muted;
  document.getElementById('mute-btn').textContent = muted ? '🔇' : '🔊';
}

// ── Sound ──────────────────────────────────────────────────────
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playSound(ok) {
  if (muted) return;
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if (ok) {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(660, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1100, ctx.currentTime + 0.13);
      gain.gain.setValueAtTime(0.22, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.55);
      osc.start(); osc.stop(ctx.currentTime + 0.55);
    } else {
      osc.type = 'sine'; osc.frequency.value = 260;
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
      osc.start(); osc.stop(ctx.currentTime + 0.2);
    }
  } catch (_) {}
}

// ── Confetti ───────────────────────────────────────────────────
function launchConfetti() {
  const cv = document.getElementById('cvc');
  cv.style.display = 'block';
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  const ctx    = cv.getContext('2d');
  const colors = ['#f59e0b','#ef4444','#3b82f6','#22c55e','#a855f7','#ec4899','#ff8c00'];
  const parts  = Array.from({ length: 140 }, () => ({
    x: Math.random() * cv.width, y: -30 - Math.random() * 200,
    r: 4 + Math.random() * 7,
    dx: (Math.random() - .5) * 5, dy: 2.5 + Math.random() * 3.5,
    rot: Math.random() * Math.PI * 2, dr: (Math.random() - .5) * .14,
    c: colors[Math.floor(Math.random() * colors.length)], sq: Math.random() < .5
  }));
  let f = 0;
  (function tick() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    parts.forEach(p => {
      p.x += p.dx; p.y += p.dy; p.rot += p.dr; p.dy = Math.min(p.dy + .04, 6.5);
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot); ctx.fillStyle = p.c;
      if (p.sq) ctx.fillRect(-p.r, -p.r * .4, p.r * 2, p.r * .8);
      else { ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI * 2); ctx.fill(); }
      ctx.restore();
    });
    if (++f < 230) requestAnimationFrame(tick);
    else { ctx.clearRect(0, 0, cv.width, cv.height); cv.style.display = 'none'; }
  })();
}

// ── Init ───────────────────────────────────────────────────────
loadLevel(0);
</script>
</body>
</html>
