<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maze — Kids Games 🎈</title>
<meta name="description" content="Generate and print mazes for kids. Easy, Medium, Hard." />
<link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="assets/css/tailwind.min.css">
<link rel="stylesheet" href="assets/css/fonts.css">
<style>
:root { --bg: #fff8ec; --ink: #1f1147; }
html, body { background: var(--bg); color: var(--ink); }
body {
  font-family: 'Nunito', system-ui, sans-serif;
  background-image:
    radial-gradient(circle at 10% 10%, rgba(255,200,87,.25) 0, transparent 35%),
    radial-gradient(circle at 90% 20%, rgba(120,200,255,.25) 0, transparent 35%),
    radial-gradient(circle at 80% 90%, rgba(255,130,160,.22) 0, transparent 35%),
    radial-gradient(circle at 15% 85%, rgba(150,230,170,.25) 0, transparent 35%);
}
.display { font-family: 'Fredoka', system-ui, sans-serif; letter-spacing: -0.02em; }
.card    { border: 3px solid var(--ink); border-radius: 28px; box-shadow: 6px 6px 0 0 var(--ink); }
.pill    { border: 2px solid var(--ink); border-radius: 999px; box-shadow: 3px 3px 0 0 var(--ink); display: inline-block; }
.btn {
  border: 3px solid var(--ink); border-radius: 999px; padding: 9px 22px;
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .9rem;
  cursor: pointer; box-shadow: 4px 4px 0 0 var(--ink);
  transition: transform .1s, box-shadow .1s; background: white; color: var(--ink);
}
.btn:hover  { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 0 var(--ink); }
.btn:active { transform: translate(2px,2px);   box-shadow: 1px 1px 0 0 var(--ink); }
.btn.on { background: var(--ink); color: #fff8ec; }
#maze-canvas { display: block; width: 100%; height: auto; }

@media print {
  body > * { display: none !important; }
  #print-area {
    display: block !important;
    position: fixed; inset: 0;
    background: white;
    display: flex; align-items: center; justify-content: center; padding: 8mm;
    box-sizing: border-box;
  }
  #print-area canvas { width: 100% !important; height: auto !important; max-width: none !important; }
}
#print-area { display: none; }
</style>
</head>
<body class="min-h-screen">

<main class="relative max-w-lg mx-auto px-5 py-8 md:py-12">

  <div class="flex items-center justify-between mb-6">
    <a href="./" class="pill bg-white px-4 py-1 text-sm font-bold">← Back</a>
    <div>
      <strong class="pill bg-[color:var(--ink)] text-[#fff8ec] px-3 py-1 text-xs font-bold">EN</strong>
      <a href="de/maze.html" class="pill bg-white px-3 py-1 text-xs font-bold ml-1">DE</a>
      <a href="sq/maze.html" class="pill bg-white px-3 py-1 text-xs font-bold ml-1">SQ</a>
    </div>
  </div>

  <header class="text-center mb-6">
    <h1 class="display text-5xl md:text-6xl font-bold mb-1">Maze 🌀</h1>
    <p class="font-semibold opacity-70">Find the way from <span style="color:#16a34a">●</span> to <span style="color:#ea580c">★</span> — then print it!</p>
  </header>

  <!-- · Difficulty · -->
  <div class="flex justify-center gap-3 mb-4">
    <button class="btn on" id="btn-easy"   onclick="setSize('easy')">Easy</button>
    <button class="btn"    id="btn-medium" onclick="setSize('medium')">Medium</button>
    <button class="btn"    id="btn-hard"   onclick="setSize('hard')">Hard</button>
  </div>

  <!-- · Actions · -->
  <div class="flex justify-center gap-3 mb-5">
    <button class="btn" style="background:#bbf7d0" onclick="generate()">Generate ↻</button>
    <button class="btn" id="btn-sol" onclick="toggleSolution()">Solution 👁</button>
    <button class="btn" onclick="printMaze()">Print 🖨</button>
  </div>

  <!-- · Canvas · -->
  <div class="card overflow-hidden mb-6" style="background:white">
    <canvas id="maze-canvas"></canvas>
  </div>

  <footer class="mt-10 text-center pb-6">
    <p class="font-semibold opacity-50 text-sm">Made with ❤️ for kids</p>
    <p class="mt-2 text-xs opacity-40 font-semibold">Designed by <a href="https://shkelzenbaftijari.gitlab.io/" target="_blank" rel="noopener" class="underline hover:opacity-80">Shkelzen Baftijari</a></p>
  </footer>

</main>

<!-- · Print zone · -->
<div id="print-area">
  <canvas id="print-canvas"></canvas>
</div>

<script>
const C = document.getElementById('maze-canvas');
const ctx = C.getContext('2d');

const SIZES   = { easy: [10,10], medium: [14,14], hard: [20,20] };
const SZ      = 700;  // internal canvas pixels
const PAD     = 36;

let COLS = 10, ROWS = 10;
let walls, solution, showSol = false;

/* ── helpers ───────────────────────────────────── */
function shuffle(a) {
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

/* ── generation (iterative DFS) ────────────────── */
function buildMaze() {
  // w[y][x] = [top, right, bottom, left]
  const w = Array.from({length:ROWS}, () =>
    Array.from({length:COLS}, () => [true,true,true,true])
  );
  const vis = Array.from({length:ROWS}, () => Array(COLS).fill(false));
  const DIRS = [[0,-1,0,2],[1,0,1,3],[0,1,2,0],[-1,0,3,1]];
  const stack = [[0,0]];
  vis[0][0] = true;

  while (stack.length) {
    const [x,y] = stack[stack.length-1];
    const nb = shuffle(DIRS.filter(([dx,dy]) => {
      const nx=x+dx, ny=y+dy;
      return nx>=0 && nx<COLS && ny>=0 && ny<ROWS && !vis[ny][nx];
    }));
    if (!nb.length) { stack.pop(); continue; }
    const [dx,dy,wf,wt] = nb[0];
    const nx=x+dx, ny=y+dy;
    w[y][x][wf] = false;
    w[ny][nx][wt] = false;
    vis[ny][nx] = true;
    stack.push([nx,ny]);
  }

  w[0][0][0] = false;                  // entry: open top of (0,0)
  w[ROWS-1][COLS-1][2] = false;        // exit:  open bottom of last cell
  return w;
}

/* ── solving (BFS) ─────────────────────────────── */
function solvePath(w) {
  const DIRS = [[0,-1,0],[1,0,1],[0,1,2],[-1,0,3]];
  const vis = Array.from({length:ROWS}, () => Array(COLS).fill(false));
  const queue = [[0,0,[[0,0]]]];
  vis[0][0] = true;
  while (queue.length) {
    const [x,y,path] = queue.shift();
    if (x===COLS-1 && y===ROWS-1) return path;
    for (const [dx,dy,wi] of DIRS) {
      const nx=x+dx, ny=y+dy;
      if (nx>=0 && nx<COLS && ny>=0 && ny<ROWS && !vis[ny][nx] && !w[y][x][wi]) {
        vis[ny][nx] = true;
        queue.push([nx,ny,[...path,[nx,ny]]]);
      }
    }
  }
  return [];
}

/* ── rendering ─────────────────────────────────── */
function render(targetCtx, targetCanvas, w, sol, drawSol) {
  const cs = Math.floor((SZ - PAD*2) / Math.max(COLS, ROWS));
  const ox = Math.floor((SZ - cs*COLS) / 2);
  const oy = Math.floor((SZ - cs*ROWS) / 2);
  const hw = Math.max(2, Math.round(cs * 0.1));  // half-wall thickness

  targetCanvas.width  = SZ;
  targetCanvas.height = SZ;

  // Page background
  targetCtx.fillStyle = 'white';
  targetCtx.fillRect(0, 0, SZ, SZ);

  // Maze block: fill ink, then carve white cells
  targetCtx.fillStyle = '#1f1147';
  targetCtx.fillRect(ox - hw, oy - hw, cs*COLS + hw*2, cs*ROWS + hw*2);

  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const px = ox + x*cs, py = oy + y*cs;
      const cell = w[y][x];
      targetCtx.fillStyle = 'white';
      targetCtx.fillRect(px+hw, py+hw, cs-hw*2, cs-hw*2);
      if (!cell[0]) targetCtx.fillRect(px+hw,    py-hw,     cs-hw*2, hw*2  ); // top
      if (!cell[1]) targetCtx.fillRect(px+cs-hw, py+hw,     hw*2,    cs-hw*2); // right
      if (!cell[2]) targetCtx.fillRect(px+hw,    py+cs-hw,  cs-hw*2, hw*2  ); // bottom
      if (!cell[3]) targetCtx.fillRect(px-hw,    py+hw,     hw*2,    cs-hw*2); // left
    }
  }

  // Solution path
  if (drawSol && sol && sol.length) {
    targetCtx.strokeStyle = 'rgba(239,68,68,.55)';
    targetCtx.lineWidth   = Math.max(3, cs * 0.38);
    targetCtx.lineCap     = 'round';
    targetCtx.lineJoin    = 'round';
    targetCtx.beginPath();
    sol.forEach(([x,y], i) => {
      const px = ox+(x+.5)*cs, py = oy+(y+.5)*cs;
      i===0 ? targetCtx.moveTo(px,py) : targetCtx.lineTo(px,py);
    });
    targetCtx.stroke();
  }

  // Entry dot (green, inside first cell)
  targetCtx.fillStyle = '#16a34a';
  targetCtx.beginPath();
  targetCtx.arc(ox+cs*.5, oy+cs*.5, cs*.22, 0, Math.PI*2);
  targetCtx.fill();

  // Exit star (orange, inside last cell)
  const ex = ox+cs*(COLS-.5), ey = oy+cs*(ROWS-.5), sr = cs*.25;
  targetCtx.fillStyle = '#ea580c';
  drawStar(targetCtx, ex, ey, 5, sr, sr*.45);
  targetCtx.fill();
}

function drawStar(targetCtx, cx, cy, pts, outer, inner) {
  targetCtx.beginPath();
  for (let i = 0; i < pts*2; i++) {
    const r = i%2===0 ? outer : inner;
    const a = (i*Math.PI/pts) - Math.PI/2;
    i===0 ? targetCtx.moveTo(cx+r*Math.cos(a), cy+r*Math.sin(a))
          : targetCtx.lineTo(cx+r*Math.cos(a), cy+r*Math.sin(a));
  }
  targetCtx.closePath();
}

/* ── controls ──────────────────────────────────── */
function setSize(s) {
  [COLS,ROWS] = SIZES[s];
  ['easy','medium','hard'].forEach(k =>
    document.getElementById('btn-'+k).classList.toggle('on', k===s)
  );
  generate();
}

function generate() {
  walls    = buildMaze();
  solution = solvePath(walls);
  showSol  = false;
  document.getElementById('btn-sol').classList.remove('on');
  render(ctx, C, walls, solution, false);
}

function toggleSolution() {
  showSol = !showSol;
  document.getElementById('btn-sol').classList.toggle('on', showSol);
  render(ctx, C, walls, solution, showSol);
}

function printMaze() {
  const pc   = document.getElementById('print-canvas');
  const pctx = pc.getContext('2d');
  render(pctx, pc, walls, solution, false); // never print solution
  window.print();
}

// Init
generate();
</script>

</body>
</html>
