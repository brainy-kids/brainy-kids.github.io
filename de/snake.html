<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snake — Spiele für Kinder 🎈</title>
<meta name="description" content="Der klassische Nokia Snake — friss, wachse, nicht abstürzen!" />
<link rel="icon" href="../assets/img/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="../assets/css/tailwind.min.css">
<link rel="stylesheet" href="../assets/css/fonts.css">
<style>
:root { --bg: #fff8ec; --ink: #1f1147; }
html, body { background: var(--bg); color: var(--ink); }
body {
  font-family: 'Nunito', system-ui, sans-serif;
  background-image:
    radial-gradient(circle at 10% 10%, rgba(255,200,87,.25) 0, transparent 35%),
    radial-gradient(circle at 90% 20%, rgba(120,200,255,.25) 0, transparent 35%),
    radial-gradient(circle at 80% 90%, rgba(255,130,160,.22) 0, transparent 35%),
    radial-gradient(circle at 15% 85%, rgba(150,230,170,.25) 0, transparent 35%);
}
.display { font-family: 'Fredoka', system-ui, sans-serif; letter-spacing: -0.02em; }
.card {
  border: 3px solid var(--ink);
  border-radius: 28px;
  box-shadow: 6px 6px 0 0 var(--ink);
}
.pill {
  border: 2px solid var(--ink);
  border-radius: 999px;
  box-shadow: 3px 3px 0 0 var(--ink);
  display: inline-block;
}
.btn-main {
  border: 3px solid var(--ink);
  border-radius: 999px;
  padding: 10px 26px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 1rem;
  cursor: pointer;
  box-shadow: 4px 4px 0 0 var(--ink);
  transition: transform .1s, box-shadow .1s;
}
.btn-main:hover  { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 0 var(--ink); }
.btn-main:active { transform: translate(2px,2px);   box-shadow: 1px 1px 0 0 var(--ink); }

/* ---- Canvas wrap ---- */
#canvas-wrap {
  border: 3px solid var(--ink);
  border-radius: 20px;
  box-shadow: 6px 6px 0 0 var(--ink);
  overflow: hidden;
  display: block;
  background: #d1fae5;
}
canvas { display: block; }

/* ---- Game-over overlay ---- */
#game-over {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(31,17,71,.8);
  border-radius: 17px;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 10px;
}
#game-over.show { display: flex; }

/* ---- D-pad ---- */
.dpad {
  display: grid;
  grid-template-areas: ". up ." "left . right" ". down .";
  grid-template-columns: repeat(3, clamp(50px, 17vw, 68px));
  grid-template-rows: repeat(3, clamp(50px, 17vw, 68px));
  gap: 5px;
  margin: 0 auto;
  width: fit-content;
}
.dpad-btn {
  border: 3px solid var(--ink);
  border-radius: 14px;
  box-shadow: 3px 3px 0 0 var(--ink);
  background: white;
  font-size: 1.5rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform .08s, box-shadow .08s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.dpad-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 0 var(--ink); }
.dpad-btn.up    { grid-area: up; }
.dpad-btn.left  { grid-area: left; }
.dpad-btn.right { grid-area: right; }
.dpad-btn.down  { grid-area: down; }
</style>
</head>
<body class="min-h-screen">

<main class="relative max-w-sm mx-auto px-4 py-8 md:py-12">

  <!-- · Nav · -->
  <div class="flex items-center justify-between mb-6">
    <a href="../" class="pill bg-white px-4 py-1 text-sm font-bold">← Zurück</a>
    <div>
      <a href="../snake.html" class="pill bg-white px-3 py-1 text-xs font-bold">EN</a>
      <strong class="pill bg-[color:var(--ink)] text-[#fff8ec] px-3 py-1 text-xs font-bold ml-1">DE</strong>
      <a href="../sq/snake.html" class="pill bg-white px-3 py-1 text-xs font-bold ml-1">SQ</a>
    </div>
  </div>

  <header class="text-center mb-5">
    <h1 class="display text-5xl md:text-6xl font-bold mb-1">Snake 🐍</h1>
    <p class="font-semibold opacity-70">Friss, wachse — nicht an die Wand abstürzen!</p>
  </header>

  <!-- · Score row · -->
  <div class="flex justify-center gap-10 mb-5">
    <div class="text-center">
      <div class="display text-xs font-bold mb-1" style="opacity:.6">Punkte</div>
      <div class="display text-3xl font-bold" id="score-disp">0</div>
    </div>
    <div class="text-center">
      <div class="display text-xs font-bold mb-1" style="opacity:.6">Rekord</div>
      <div class="display text-3xl font-bold" id="hi-disp">0</div>
    </div>
  </div>

  <!-- · Canvas · -->
  <div class="relative mb-5" style="line-height:0">
    <div id="canvas-wrap">
      <canvas id="canvas"></canvas>
    </div>
    <div id="game-over">
      <div class="card text-center" style="background:#fef08a;padding:1.5rem 2rem;max-width:240px">
        <div class="display text-4xl font-bold mb-1">Game Over!</div>
        <div id="over-score" class="display text-2xl font-bold mb-4"></div>
        <button class="btn-main bg-emerald-300" onclick="startGame()">Nochmal ↺</button>
      </div>
    </div>
  </div>

  <!-- · D-pad · -->
  <div class="dpad mb-6">
    <button class="dpad-btn up"    onclick="changeDir(0,-1)">▲</button>
    <button class="dpad-btn left"  onclick="changeDir(-1,0)">◀</button>
    <button class="dpad-btn right" onclick="changeDir(1,0)">▶</button>
    <button class="dpad-btn down"  onclick="changeDir(0,1)">▼</button>
  </div>

  <div class="text-center mt-4">
    <button class="btn-main bg-emerald-300" id="start-btn" onclick="startGame()">Spielen ▶</button>
  </div>

  <footer class="mt-16 text-center pb-6">
    <p class="font-semibold opacity-50 text-sm">Mit ❤️ für Kinder gemacht</p>
    <p class="mt-2 text-xs opacity-40 font-semibold">Designed by <a href="https://shkelzenbaftijari.gitlab.io/" target="_blank" rel="noopener" class="underline hover:opacity-80">Shkelzen Baftijari</a></p>
  </footer>

</main>

<script>
const COLS = 20, ROWS = 20;
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

let cellSize = 18;
let snake, dir, nextDir, food, score, loopId;
let gameRunning = false;
let gridCanvas = null;
let hiScore = parseInt(localStorage.getItem('snake-hi') || '0', 10);

document.getElementById('hi-disp').textContent = hiScore;

function resize() {
  const maxW = Math.min(window.innerWidth - 48, 360);
  cellSize = Math.floor(maxW / COLS);
  canvas.width  = cellSize * COLS;
  canvas.height = cellSize * ROWS;
  buildGrid();
  if (gameRunning) draw();
  else drawIdle();
}

function buildGrid() {
  gridCanvas = document.createElement('canvas');
  gridCanvas.width  = cellSize * COLS;
  gridCanvas.height = cellSize * ROWS;
  const gc = gridCanvas.getContext('2d');
  gc.fillStyle = 'rgba(31,17,71,.05)';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      gc.beginPath();
      gc.arc(c * cellSize + cellSize / 2, r * cellSize + cellSize / 2, 1.5, 0, Math.PI * 2);
      gc.fill();
    }
  }
}

window.addEventListener('resize', resize);

function startGame() {
  snake = [
    {x:12, y:10}, {x:11, y:10}, {x:10, y:10},
  ];
  dir     = {x:1, y:0};
  nextDir = {x:1, y:0};
  score   = 0;
  gameRunning = true;
  document.getElementById('game-over').classList.remove('show');
  document.getElementById('score-disp').textContent = 0;
  document.getElementById('start-btn').textContent = 'Neustart ↺';
  placeFood();
  clearTimeout(loopId);
  loop();
}

function getSpeed() {
  return Math.max(120, 300 - Math.floor(score / 5) * 18);
}

function loop() {
  if (!gameRunning) return;
  dir = { ...nextDir };
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS
      || snake.some(s => s.x === head.x && s.y === head.y)) {
    endGame();
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    document.getElementById('score-disp').textContent = score;
    if (score > hiScore) {
      hiScore = score;
      localStorage.setItem('snake-hi', hiScore);
      document.getElementById('hi-disp').textContent = hiScore;
    }
    placeFood();
  } else {
    snake.pop();
  }

  draw();
  loopId = setTimeout(loop, getSpeed());
}

function placeFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS)};
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function draw() {
  ctx.fillStyle = '#d1fae5';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (gridCanvas) ctx.drawImage(gridCanvas, 0, 0);

  // Food
  ctx.font = `${Math.floor(cellSize * 0.82)}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🍎', food.x * cellSize + cellSize / 2, food.y * cellSize + cellSize / 2);

  // Snake segments
  snake.forEach((seg, i) => {
    const pad = cellSize * 0.1;
    const x = seg.x * cellSize + pad;
    const y = seg.y * cellSize + pad;
    const s = cellSize - pad * 2;
    const r = i === 0 ? s * 0.42 : s * 0.32;

    ctx.fillStyle = i === 0 ? '#1f1147' : (i % 2 === 0 ? '#4f46e5' : '#6d28d9');
    roundRect(x, y, s, s, r);
    ctx.fill();

    if (i === 0) {
      ctx.fillStyle = 'white';
      const ew = s * 0.15;
      const ey = y + s * 0.3;
      ctx.beginPath();
      ctx.arc(x + s * 0.28, ey, ew, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x + s * 0.65, ey, ew, 0, Math.PI * 2);
      ctx.fill();
    }
  });
}

function drawIdle() {
  ctx.fillStyle = '#d1fae5';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = 'rgba(31,17,71,.2)';
  ctx.font = `bold ${Math.floor(cellSize * 1.1)}px Fredoka, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🐍 SNAKE', canvas.width / 2, canvas.height / 2);
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function changeDir(dx, dy) {
  if (dx === -dir.x && dy === -dir.y) return;
  nextDir = {x: dx, y: dy};
}

function endGame() {
  gameRunning = false;
  clearTimeout(loopId);
  document.getElementById('over-score').textContent = `Punkte: ${score}`;
  document.getElementById('game-over').classList.add('show');
}

// Keyboard controls
document.addEventListener('keydown', e => {
  const map = {
    ArrowUp:    [0, -1], ArrowDown: [0, 1],
    ArrowLeft:  [-1, 0], ArrowRight: [1, 0],
    w: [0,-1], s: [0,1], a: [-1,0], d: [1,0],
  };
  if (map[e.key]) {
    e.preventDefault();
    changeDir(...map[e.key]);
    if (!gameRunning) startGame();
  }
});

// Touch swipe on canvas
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  touchStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
}, {passive: true});
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  if (Math.abs(dx) > Math.abs(dy)) {
    changeDir(dx > 0 ? 1 : -1, 0);
  } else {
    changeDir(0, dy > 0 ? 1 : -1);
  }
  touchStart = null;
}, {passive: true});

resize();
</script>
</body>
</html>
